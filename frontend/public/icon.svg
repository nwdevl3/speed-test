  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  <circle cx="256" cy="256" r="160" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="24" stroke-linecap="round" stroke-dasharray="600 800" transform="rotate(135 256 256)"/>
