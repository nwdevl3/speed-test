  <path d="M 256 266 L 246 256 L 360 140 L 266 246 Z" fill="url(#needle)" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="20" fill="#06090f" stroke="#06b6d4" stroke-width="8"/>
