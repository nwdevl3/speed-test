services:
  - type: web
    name: speed-test
    runtime: python
    buildCommand: cd frontend && npm install && npm run build && cd .. && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.10"
      - key: NODE_VERSION
        value: "20.x"
